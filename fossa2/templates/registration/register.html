<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>


{% block content %}
<style>
    /* 1. Tło całej strony */
    body {
        margin: 0;
        padding: 0;
        /* Ładny, nowoczesny gradient (Blue-Purple) */
        background-color: #f4f7f6;
        background-attachment: fixed;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* 2. Karta z formularzem */
    .register-card {
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        width: 100%;
        max-width: 450px;
        /* DODAJ TE LINIE PONIŻEJ */
        border-top: 8px solid #004b93; /* Grubszy pasek w kolorze KNF */
        border-top-left-radius: 15px;  /* Aby pasek pasował do zaokrąglonych rogów */
        border-top-right-radius: 15px;
    }

    .register-card h2 {
        text-align: center;
        color: #333;
        margin-bottom: 10px;
        font-weight: 700;
    }

    .register-card p.subtitle {
        text-align: center;
        color: #777;
        margin-bottom: 30px;
        font-size: 14px;
    }

    /* 3. Stylizacja pól Django (form.as_p) */
    form p {
        margin-bottom: 20px;
    }

    form label {
        display: block;
        margin-bottom: 7px;
        color: #555;
        font-weight: 600;
        font-size: 14px;
    }

    form input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        transition: border-color 0.3s;
        box-sizing: border-box; /* Ważne dla szerokości */
    }

    form input:focus {
        border-color: #667eea;
        outline: none;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .helptext, .helptext ul {
        font-size: 11px;
        color: #999;
        margin-top: 5px;
        padding-left: 15px;
        line-height: 1.4;
    }

    .btn-register {
        width: 100%;
        padding: 14px;
        background-color: #004b93;
        color: white;
        border-radius: 4px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        margin-top: 10px;
    }

      .btn-register:hover {
        background-color: #003a72;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .card-footer {
        text-align: center;
        margin-top: 25px;
        font-size: 14px;
        color: #666;
        border-top: 1px solid #eee;
        padding-top: 20px;
    }

    .card-footer a {
        color: #004b93;;
        text-decoration: none;
        font-weight: bold;
    }

    .card-footer a:hover {
        text-decoration: underline;
    }
</style>

<div class="register-card">
    <h2>Witaj!</h2>
    <p class="subtitle">Zarejestruj się, aby kontynuować</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-register">Zarejestruj się</button>
    </form>

    <div class="card-footer">
        Masz już konto? <a href="{% url 'login' %}">Zaloguj się tutaj</a>
    </div>
</div>
{% endblock %}
</body>
</html>
